name: Run CD
description: Publish new release to maven central

inputs:
  new-version:  # id of input
    description: 'Pattern for new version'
    required: true
  gpg-key:
    description: 'GPG Key'
    required: true
  gpg-passphrase:
    description: 'GPG Passphrase'
    required: true
  server-username:
    description: 'Username for maven deploy'
    required: true
  server-token:
    description: 'Server token for maven deploy'
    required: true
  github-token:
    description: 'GitHub token'
    required: true
  version-push-pat:
    description: 'PAT to push a version'
    required: true
  bot-mail:
    description: 'Email address of the bot'
    required: true

runs:
  using: composite
  steps:
    - name: Force JavaScript actions to Node 24
      shell: bash
      run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> "$GITHUB_ENV"
    - name: Checkout
      uses: actions/checkout@v6.0.2
      with:
        persist-credentials: false # use GITHUB_TOKEN, instead of personal token
        fetch-depth: 0 # otherwise, pushing refs to dest repo fails
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        server-id: central # Value of the distributionManagement/repository/id field of the pom.xml
        server-username: MAVEN_USERNAME # env variable for username in deploy
        server-password: MAVEN_TOKEN # env variable for token in deploy
        gpg-private-key: ${{ inputs.gpg-key }} # Value of the GPG private key to import
        gpg-passphrase: MAVEN_GPG_PASSPHRASE # env variable for GPG private key passphrase
    - name: Set release version
      shell: bash
      run: mvn build-helper:parse-version versions:set -DnewVersion=${{ inputs.new-version }} versions:commit
    - name: Build and Release
      shell: bash
      run: mvn clean deploy
      env:
        MAVEN_USERNAME: ${{ inputs.server-username }}
        MAVEN_TOKEN: ${{ inputs.server-token }}
        MAVEN_GPG_PASSPHRASE: ${{ inputs.gpg-passphrase }}
    - name: Commit & Push release version
      shell: bash
      run: |
        git config user.email "${{ inputs.bot-mail }}"
        git config user.name "skunkworks-rabot"
        git add pom.xml
        if git diff --cached --quiet; then
          echo "::error::No release version change found in pom.xml"
          exit 1
        fi
        RELEASE_VERSION="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
        git commit -m "Release ${RELEASE_VERSION}"
        git push "https://x-access-token:${{ inputs.version-push-pat }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
    - name: Set release metadata env variables
      shell: bash
      run: |
        echo "RELEASE_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_ENV"
        echo "RELEASE_COMMIT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
    - name: Create Release
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        gh release create "${RELEASE_VERSION}" \
          --title "Release ${RELEASE_VERSION}" \
          --target "${RELEASE_COMMIT_SHA}" \
          --draft
    - name: Prepare next release version
      shell: bash
      run: mvn build-helper:parse-version versions:set -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}-SNAPSHOT versions:commit
    - name: Commit & Push next snapshot version
      shell: bash
      run: |
        git add pom.xml
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "Prepare next release version"
        git push "https://x-access-token:${{ inputs.version-push-pat }}@github.com/${{ github.repository }}.git" "HEAD:${{ github.ref_name }}"
    - name: Maven Dependency Tree Dependency Submission
      uses: advanced-security/maven-dependency-submission-action@v5.0.0
